name: NigerGram Build Pipeline

# This stops it from running automatically on every single push!
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java Development Kit (JDK 17) with Cloud Cache
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle' # This saves hundreds of megabytes and slashes build time significantly!

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    - name: Compile Application with Gradle
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Build Artifact (APK)
      uses: actions/upload-artifact@v4
      with:
        name: NigerGram-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
